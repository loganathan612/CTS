spring.application.name=api-gateway
server.port=9090

# Register with Eureka Discovery Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Enable discovery-based routing (auto-routes to services by their Eureka name)
spring.cloud.gateway.discovery.locator.enabled=true

# Use lowercase service names in URLs: /greet-service/greet (not /GREET-SERVICE/greet)
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

logging.level.com.cognizant.apigateway=DEBUG
